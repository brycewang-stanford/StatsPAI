name: Recommend benchmark

# The agent-native correctness ratchet (CLAUDE.md §1 — "agent loop must be
# RIGHT, not just run"). Runs the recommendation hit-rate benchmark and fails
# the build if the moat regresses: any HARD-MISS (top-1 = a disqualifying
# estimator, e.g. TWFE on a staggered design), any recommend/audit error, any
# §10 citation error (a corpus bib_key absent from paper.bib), or a top-1
# hit-rate below the pinned floor. hard-miss = 0 is the non-negotiable
# invariant; the hit-rate floor ratchets up as the corpus proves higher.
#
# Source of truth: sp.recommend_benchmark() + benchmarks/recommend_hit_rate/.

on:
  push:
    branches: [main]
    paths:
      - "src/statspai/smart/recommend.py"
      - "src/statspai/smart/detect_design.py"
      - "src/statspai/smart/audit.py"
      - "src/statspai/smart/recommend_benchmark.py"
      - "benchmarks/recommend_hit_rate/**"
      - ".github/workflows/recommend-benchmark.yml"
  pull_request:
    branches: [main]
    paths:
      - "src/statspai/smart/recommend.py"
      - "src/statspai/smart/detect_design.py"
      - "src/statspai/smart/audit.py"
      - "src/statspai/smart/recommend_benchmark.py"
      - "benchmarks/recommend_hit_rate/**"
      - ".github/workflows/recommend-benchmark.yml"
  workflow_dispatch:

concurrency:
  group: recommend-benchmark-${{ github.ref }}
  cancel-in-progress: true

jobs:
  hit-rate-ratchet:
    name: Recommendation hit-rate ratchet
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      STATSPAI_SKIP_RUST: "1"
    steps:
      - uses: actions/checkout@v5
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]" pyyaml
      - name: Run recommend-benchmark ratchet
        run: |
          python benchmarks/recommend_hit_rate/harness.py --check --min-hit-rate 0.9
      - name: Upload scorecard
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: recommend-scorecard
          path: |
            benchmarks/recommend_hit_rate/scorecard.md
            benchmarks/recommend_hit_rate/scorecard.json
          if-no-files-found: ignore
